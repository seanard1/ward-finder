    .ward-widget button:disabled {
      background: #999;
      cursor: not-allowed;

const GEOCODE_PROXY_URL = 'https://ward-geocode-proxy.YOUR-SUBDOMAIN.workers.dev';

function normalizePostal(raw) {
  // Strip spaces/dashes, uppercase, then re-insert standard "A1A 1A1" spacing
  const clean = raw.replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
  if (clean.length === 6) {
    return clean.slice(0, 3) + ' ' + clean.slice(3);
  }
  return raw.trim().toUpperCase();
}

      try {
        const zipUrl = `https://api.zippopotam.us/CA/${encodeURIComponent(fsa)}`;
        const zipResponse = await fetch(zipUrl);
        if (zipResponse.ok) {
          const zipData = await zipResponse.json();
          if (zipData && zipData.places && zipData.places.length > 0) {
            lat = parseFloat(zipData.places[0].latitude);
            lon = parseFloat(zipData.places[0].longitude);
          }
        }
      } catch (zipErr) {
        console.warn('zippopotam lookup failed, will try next fallback', zipErr);
      }
    }

    // 3) Last-resort fallback: Nominatim structured query.
    if (lat === null || lon === null || isNaN(lat) || isNaN(lon)) {
      const geoUrl = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(postal + ', Canada')}&format=json&limit=1`;
      const response = await fetch(geoUrl, {
        headers: { 'Accept-Language': 'en' }
      });

      if (response.ok) {
        const data = await response.json();
        if (data && data.length > 0) {
          lat = parseFloat(data[0].lat);
          lon = parseFloat(data[0].lon);
        }
      }
    }

    if (lat === null || lon === null || isNaN(lat) || isNaN(lon)) {
      result.innerHTML = 'Postal code not found. Please double-check it and try again.';
      return;
    }

    const point = turf.point([lon, lat]);
    let foundWard = null;

    for (const feature of wardData.features) {
      if (turf.booleanPointInPolygon(point, feature)) {
        foundWard = feature.properties.WARD;
        break;
      }
    }

    if (foundWard !== null) {
      result.innerHTML = `<strong>Ward ${foundWard}</strong>`;
    } else {
      result.innerHTML = 'That postal code falls outside the mapped wards.';
    }
  } catch (err) {
    console.error(err);
    result.innerHTML = 'Error looking up postal code. Please try again in a moment.';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Find Ward';
  }
}

// Allow pressing Enter in the input field to trigger the search
document.getElementById('postal').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    findWard();
  }
});
</script>
